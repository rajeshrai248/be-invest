# nginx.conf - Langfuse deployment
worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  logs/access.log  main;
    error_log   logs/error.log;

    # Basic settings
    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/json;

    # Block known malicious IPs
    geo $blocked_ip {
        default 0;
        45.148.10.64    1;  # AS48090 TECHOFF SRV LIMITED - AbuseIPDB 100% score, 871 reports, active scanner
        195.178.110.33  1;  # .env credential harvester - multi-path sweep 2026-02-16
        195.178.110.160 1;  # same subnet as above - .env probe 2026-02-16
    }

    # Rate limiting for Langfuse
    limit_req_zone $binary_remote_addr zone=langfuse:10m rate=5r/s;

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # Upstream for Langfuse
    upstream langfuse_backend {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # Main server block
    server {
        listen       8080;
        server_name  localhost;

        if ($blocked_ip) {
            return 444;  # Drop connection silently (no response)
        }

        # Root redirect to Langfuse
        location = / {
            return 301 /langfuse/;
        }

        # Langfuse observability platform
        location /langfuse/ {
            limit_req zone=langfuse burst=20 nodelay;

            proxy_pass http://langfuse_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /langfuse;

            # WebSocket support for real-time features
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "Langfuse proxy OK\n";
            add_header Content-Type text/plain;
        }

        # Security - block common attack paths
        location ~ /\.(ht|git|svn) {
            deny all;
            return 404;
        }

        location ~ /(wp-admin|wp-content|wp-includes|phpmyadmin) {
            deny all;
            return 404;
        }

        # Error pages
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
