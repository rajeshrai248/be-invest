worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    upstream langfuse_backend {
        server 127.0.0.1:3000;
    }

    # Block known malicious IPs
    geo $blocked_ip {
        default 0;
        45.148.10.64    1;  # AS48090 TECHOFF SRV LIMITED - AbuseIPDB 100% score, 871 reports, active scanner
        195.178.110.33  1;  # .env credential harvester - multi-path sweep 2026-02-16
        195.178.110.160 1;  # same subnet as above - .env probe 2026-02-16
    }

    server {
        listen       8080;
        server_name  localhost;

        if ($blocked_ip) {
            return 444;  # Drop connection silently (no response)
        }

        location /langfuse/ {
            proxy_pass http://langfuse_backend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        location = / {
            return 301 /langfuse/;
        }
    }
}
